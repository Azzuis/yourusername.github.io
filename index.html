<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Remindr</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b2420;cursor:none}

  /* ── CURSOR ── */
  .cur{position:fixed;width:8px;height:8px;border-radius:50%;background:#7fffd4;pointer-events:none;z-index:1000;transform:translate(-50%,-50%);transition:width .2s,height .2s}
  .cur-ring{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(127,255,212,0.4);pointer-events:none;z-index:999;transform:translate(-50%,-50%)}

  /* ── HIDDEN TEXT CANVAS SOURCE ── */
  /* We draw text here, then read it as a texture for WebGL */
  #text-source{
    position:fixed;
    top:0;left:0;
    pointer-events:none;
    opacity:0; /* hidden — only used as WebGL texture */
    z-index:-1;
  }

  /* ── WEBGL OUTPUT ── */
  #gl-canvas{
    position:fixed;
    inset:0;
    z-index:1;
    display:block;
  }

  /* ── UI LAYER ── */
  #ui{
    position:fixed;inset:0;z-index:10;
    pointer-events:none;
  }

  nav{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:flex-start;justify-content:space-between;
    padding:1.6rem 2.5vw;
    pointer-events:all;
  }

  .nav-logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:1.5rem;letter-spacing:0.1em;
    color:#c8ede8;text-decoration:none;
    display:flex;align-items:center;gap:0.45rem;
    text-shadow:0 0 20px rgba(82,240,180,0.4);
    flex-shrink:0;
  }

  .nav-led{
    width:6px;height:6px;border-radius:50%;
    background:#52f0b4;
    box-shadow:0 0 8px #52f0b4;
    animation:ledp 2.5s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes ledp{0%,100%{opacity:1}50%{opacity:0.3}}

  .nav-links{
    display:flex;gap:2.5rem;list-style:none;
    padding-top:0.15rem;
  }
  .nav-links a{
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.82rem;font-weight:700;
    letter-spacing:0.16em;text-transform:uppercase;
    color:rgba(200,237,232,0.6);text-decoration:none;
    transition:color 0.2s;pointer-events:all;
  }
  .nav-links a:hover{color:#c8ede8}

  /* Center CTA */
  .cta-group{
    position:absolute;
    bottom:10%;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:1rem;
    pointer-events:all;
    text-align:center;
  }

  .tagline{
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(0.85rem,1.6vw,1.2rem);
    font-style:italic;letter-spacing:0.06em;
    color:rgba(200,237,232,0.5);
  }

  .btn-cta{
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.8rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
    color:#0b2420;background:#52f0b4;
    border:none;padding:0.8rem 2.4rem;
    cursor:none;text-decoration:none;display:inline-block;
    transition:background 0.2s,box-shadow 0.2s;
  }
  .btn-cta:hover{background:#7fffd4;box-shadow:0 0 28px rgba(82,240,180,0.5)}

  .explore{
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.6rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
    color:rgba(200,237,232,0.25);
    display:flex;flex-direction:column;align-items:center;gap:0.4rem;
  }
  .explore-line{
    width:1px;height:28px;
    background:linear-gradient(to bottom,rgba(200,237,232,0.25),transparent);
    animation:el 1.8s ease-in-out infinite;
  }
  @keyframes el{
    0%{transform:scaleY(0);transform-origin:top}
    50%{transform:scaleY(1);transform-origin:top}
    51%{transform:scaleY(1);transform-origin:bottom}
    100%{transform:scaleY(0);transform-origin:bottom}
  }

  /* Corner meta */
  .cmeta{
    position:absolute;
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.6rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
    color:rgba(200,237,232,0.2);line-height:1.9;
  }
  .cm-bl{bottom:2.5%;left:2.5vw}
  .cm-br{bottom:2.5%;right:2.5vw;text-align:right}

  /* Buoy elements bob */
  .buoy{display:inline-block}
</style>
</head>
<body>

<!-- HIDDEN: text rendered here, read as WebGL texture -->
<canvas id="text-source"></canvas>

<!-- WebGL output: displaced text + water -->
<canvas id="gl-canvas"></canvas>

<!-- UI on top -->
<div id="ui">
  <nav>
    <a href="#" class="nav-logo buoy" id="b-logo">
      <span class="nav-led"></span>REMINDR
    </a>
    <ul class="nav-links">
      <li><a href="#" class="buoy" id="b-n1">Projects</a></li>
      <li><a href="#" class="buoy" id="b-n2">About Me</a></li>
      <li><a href="#" class="buoy" id="b-n3">Contact</a></li>
      <li><a href="#" class="buoy" id="b-n4">Blog</a></li>
    </ul>
  </nav>

  <div class="cta-group">
    <p class="tagline">Smart LED reminders — woven into everyday life.</p>
    <a href="#" class="btn-cta buoy" id="b-btn">See Our Work</a>
    <div class="explore">
      Explore
      <div class="explore-line"></div>
    </div>
  </div>

  <div class="cmeta cm-bl">Smart IoT // 2025<br>remind-r.ca</div>
  <div class="cmeta cm-br">Est. 2025 //<br>Design No. 01</div>
</div>

<!-- Cursor -->
<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<script>
// ═══════════════════════════════
// CURSOR
// ═══════════════════════════════
const cur = document.getElementById('cur');
const curRing = document.getElementById('curRing');
let mx=window.innerWidth/2, my=window.innerHeight/2, rx=mx, ry=my;
document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function animCur(){
  rx+=(mx-rx)*0.1; ry+=(my-ry)*0.1;
  curRing.style.left=rx+'px'; curRing.style.top=ry+'px';
  requestAnimationFrame(animCur);
})();
document.querySelectorAll('a,.btn-cta').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.width='16px';cur.style.height='16px';curRing.style.width='44px';curRing.style.height='44px'});
  el.addEventListener('mouseleave',()=>{cur.style.width='8px';cur.style.height='8px';curRing.style.width='32px';curRing.style.height='32px'});
});

// ═══════════════════════════════
// STEP 1: DRAW TEXT TO OFFSCREEN CANVAS
// This becomes our "scene texture" for WebGL to distort
// ═══════════════════════════════
const textCanvas = document.getElementById('text-source');
const tCtx = textCanvas.getContext('2d');

function drawTextScene(w, h) {
  textCanvas.width = w;
  textCanvas.height = h;

  // Background
  tCtx.fillStyle = '#0d2d27';
  tCtx.fillRect(0, 0, w, h);

  // Figure out font size so REMINDR fills full width
  // REMINDR is 7 chars, Bebas Neue is roughly 0.6 width:height ratio
  // We want the word to go edge to edge with small padding
  const padding = w * 0.01;
  let fontSize = 10;
  tCtx.font = `${fontSize}px 'Bebas Neue', serif`;
  // Binary search for the right size
  let lo=10, hi=600;
  for(let i=0;i<20;i++){
    const mid = (lo+hi)/2;
    tCtx.font = `${mid}px 'Bebas Neue', serif`;
    const tw = tCtx.measureText('REMINDR').width;
    if(tw < w - padding*2) lo=mid; else hi=mid;
  }
  fontSize = lo;

  // How many rows fit?
  const lineH = fontSize * 0.88;
  const rows = Math.ceil(h / lineH) + 1;

  // Draw each row with teal color gradient
  const colors = [
    'rgba(20,90,75,0.55)',
    'rgba(22,100,84,0.68)',
    'rgba(24,110,92,0.78)',
    'rgba(26,122,102,0.88)',
    'rgba(28,135,112,0.94)',
    'rgba(30,148,122,1.0)',
    'rgba(32,160,130,1.0)',
    'rgba(34,172,140,1.0)',
  ];

  tCtx.textAlign = 'center';
  tCtx.textBaseline = 'top';
  tCtx.font = `${fontSize}px 'Bebas Neue', serif`;

  for(let r=0; r<rows; r++){
    const y = r * lineH;
    const colorIdx = Math.min(r, colors.length-1);
    tCtx.fillStyle = colors[colorIdx];
    tCtx.fillText('REMINDR', w/2, y);
  }
}

// ═══════════════════════════════
// STEP 2: WEBGL — distort the text texture
// ═══════════════════════════════
const glCanvas = document.getElementById('gl-canvas');
const gl = glCanvas.getContext('webgl', {alpha:false}) || glCanvas.getContext('experimental-webgl', {alpha:false});

const vsSource = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main(){
    v_uv = vec2(a_pos.x * 0.5 + 0.5, 0.5 - a_pos.y * 0.5);
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

const fsSource = `
  precision highp float;
  varying vec2 v_uv;

  uniform sampler2D u_scene;   // the text canvas texture
  uniform float u_time;
  uniform vec2  u_resolution;
  uniform vec2  u_drops[16];
  uniform float u_dropAge[16];
  uniform int   u_dropCount;

  // Calculate total displacement from all ripples + ambient
  vec2 getDisplacement(vec2 uv, vec2 aspect){
    vec2 disp = vec2(0.0);

    // Ambient gentle water movement — always present
    float ax = sin(uv.x * 4.0 + u_time * 0.7) * 0.0015
             + sin(uv.y * 6.0 + u_time * 0.5) * 0.001;
    float ay = cos(uv.x * 5.0 + u_time * 0.6) * 0.0015
             + cos(uv.y * 3.0 + u_time * 0.8) * 0.001;
    disp += vec2(ax, ay);

    // Mouse/touch ripples
    for(int i = 0; i < 16; i++){
      if(i >= u_dropCount) break;
      vec2 center = u_drops[i];
      float age = u_dropAge[i];

      vec2 diff = (uv - center) * aspect;
      float dist = length(diff);

      // Wave front expands outward at speed ~0.3 units/sec
      float waveFront = age * 0.28;
      float waveWidth = 0.08;

      // Only show wave near the expanding front
      float envelope = exp(-pow((dist - waveFront) / waveWidth, 2.0));
      // Fade over time
      float fade = exp(-age * 0.9);
      // Ripple oscillation
      float wave = sin(dist * 35.0 - age * 8.0) * envelope * fade;

      // Displacement points away from center
      vec2 dir = dist > 0.0001 ? normalize(diff) : vec2(0.0);
      disp += dir * wave * 0.022;
    }

    return disp;
  }

  void main(){
    vec2 aspect = vec2(u_resolution.x / u_resolution.y, 1.0);
    vec2 disp = getDisplacement(v_uv, aspect);

    // Sample scene with displacement
    vec2 sampledUV = v_uv + disp;
    sampledUV = clamp(sampledUV, 0.0, 1.0);
    vec3 scene = texture2D(u_scene, sampledUV).rgb;

    // Water tint overlay — very subtle, increases with displacement
    float dispMag = length(disp) * 30.0;
    vec3 waterTint = vec3(0.1, 0.55, 0.45);
    vec3 shimmer = vec3(0.5, 0.95, 0.82);

    // Mix shimmer on wave peaks
    vec3 col = mix(scene, waterTint, 0.08);
    col = mix(col, shimmer, clamp(dispMag * 0.4, 0.0, 0.25));

    // Subtle vignette
    vec2 vig = v_uv * 2.0 - 1.0;
    float vignette = 1.0 - dot(vig, vig) * 0.18;
    col *= vignette;

    gl_FragColor = vec4(col, 1.0);
  }
`;

function makeShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog);
gl.useProgram(prog);

// Quad
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uTime     = gl.getUniformLocation(prog,'u_time');
const uRes      = gl.getUniformLocation(prog,'u_resolution');
const uDrops    = gl.getUniformLocation(prog,'u_drops');
const uDropAge  = gl.getUniformLocation(prog,'u_dropAge');
const uDropCount= gl.getUniformLocation(prog,'u_dropCount');
const uScene    = gl.getUniformLocation(prog,'u_scene');

// Scene texture (the 2D text canvas)
const sceneTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, sceneTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.uniform1i(uScene, 0);

// ── Ripple drops ──
const MAX_DROPS = 16;
let drops = [];
let lastDropAt = 0;

document.addEventListener('mousemove', e => {
  const now = performance.now();
  if(now - lastDropAt < 60) return;
  lastDropAt = now;
  if(drops.length >= MAX_DROPS) drops.shift();
  drops.push({
    x: e.clientX / window.innerWidth,
    y: e.clientY / window.innerHeight,
    age: 0
  });
});

// Touch
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  const now = performance.now();
  if(now - lastDropAt < 60) return;
  lastDropAt = now;
  if(drops.length >= MAX_DROPS) drops.shift();
  drops.push({x: t.clientX/window.innerWidth, y: t.clientY/window.innerHeight, age:0});
}, {passive:true});

// ── Resize ──
function resize(){
  const W = window.innerWidth, H = window.innerHeight;
  glCanvas.width = W; glCanvas.height = H;
  gl.viewport(0,0,W,H);

  // Redraw text at new size
  drawTextScene(W, H);
  // Upload to GPU
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, sceneTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, textCanvas);
}

// Wait for font to load before drawing
document.fonts.ready.then(() => {
  resize();
  window.addEventListener('resize', resize);
});

// ── Render loop ──
const startTime = performance.now();
const DT = 1/60;

function render(){
  const now = performance.now();
  const t = (now - startTime) * 0.001;

  // Age drops, remove old ones
  drops.forEach(d => d.age += DT);
  drops = drops.filter(d => d.age < 3.5);

  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, glCanvas.width, glCanvas.height);

  // Pack drops into flat arrays
  const dXY  = new Float32Array(MAX_DROPS * 2).fill(0);
  const dAge = new Float32Array(MAX_DROPS).fill(0);
  drops.forEach((d,i) => { dXY[i*2]=d.x; dXY[i*2+1]=d.y; dAge[i]=d.age; });
  gl.uniform2fv(uDrops, dXY);
  gl.uniform1fv(uDropAge, dAge);
  gl.uniform1i(uDropCount, drops.length);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();

// ═══════════════════════════════
// STEP 3: BUOY PHYSICS
// ═══════════════════════════════
class Buoy {
  constructor(el){
    this.el = el;
    this.ox=0; this.oy=0;
    this.vx=0; this.vy=0;
    this.k = 0.07;        // spring stiffness
    this.damp = 0.75;     // damping
    this.phase = Math.random()*Math.PI*2;
    this.freqX = 0.35 + Math.random()*0.25;
    this.freqY = 0.28 + Math.random()*0.2;
    this.ampX  = 0.3 + Math.random()*0.5;
    this.ampY  = 0.5 + Math.random()*0.7;
  }

  // Sample wave strength near this element
  waveAt(t){
    let w = 0;
    const rect = this.el.getBoundingClientRect();
    const nx = (rect.left + rect.width/2) / window.innerWidth;
    const ny = (rect.top  + rect.height/2) / window.innerHeight;
    drops.forEach(d => {
      const dx = (nx - d.x) * (window.innerWidth/window.innerHeight);
      const dy = ny - d.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const waveFront = d.age * 0.28;
      const envelope = Math.exp(-Math.pow((dist-waveFront)/0.08, 2));
      const fade = Math.exp(-d.age * 0.9);
      w += Math.sin(dist*35 - d.age*8) * envelope * fade;
    });
    return w;
  }

  update(t){
    const wave = this.waveAt(t);
    // Ambient bob
    const tx = Math.sin(t*this.freqX + this.phase) * this.ampX;
    const ty = Math.sin(t*this.freqY + this.phase*1.3) * this.ampY;
    // Spring toward ambient + wave
    const fx = (-this.ox + tx*0.4 + wave*2.5) * this.k;
    const fy = (-this.oy + ty*0.5 + wave*3.0) * this.k;
    this.vx = (this.vx + fx) * this.damp;
    this.vy = (this.vy + fy) * this.damp;
    this.ox += this.vx;
    this.oy += this.vy;
    // Max displacement 5px
    this.ox = Math.max(-5,Math.min(5,this.ox));
    this.oy = Math.max(-5,Math.min(5,this.oy));
    this.el.style.transform = `translate(${this.ox.toFixed(2)}px,${this.oy.toFixed(2)}px)`;
  }
}

const buoys = [];
document.querySelectorAll('.buoy').forEach(el => buoys.push(new Buoy(el)));

function animBuoys(){
  const t = (performance.now()-startTime)*0.001;
  buoys.forEach(b => b.update(t));
  requestAnimationFrame(animBuoys);
}
animBuoys();
</script>
</body>
</html>
